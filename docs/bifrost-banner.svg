<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220" role="img">
  <title>Bifrost-MCP Gateway — Dynamic MCP Proxy</title>
  <desc>Animated banner showing the Bifrost gateway concept with data flowing across a bridge between AI agents and tool backends.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#040812"/>
      <stop offset="100%" stop-color="#080f1e"/>
    </linearGradient>

    <!-- Accent glow for bridge rail -->
    <linearGradient id="rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#00cfff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <!-- Packet glow -->
    <radialGradient id="pkglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Left pillar glow -->
    <radialGradient id="pillarL" cx="50%" cy="100%" r="80%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Right pillar glow -->
    <radialGradient id="pillarR" cx="50%" cy="100%" r="80%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="rgba(255,255,255,0.025)"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- Clip for packets on bridge -->
    <clipPath id="bridgeclip">
      <rect x="100" y="80" width="660" height="60"/>
    </clipPath>

    <!-- Animations -->
    <style>
      @keyframes packet1 {
        0%   { transform: translateX(0px);   opacity: 0; }
        5%   { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(660px); opacity: 0; }
      }
      @keyframes packet2 {
        0%   { transform: translateX(0px);   opacity: 0; }
        5%   { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(660px); opacity: 0; }
      }
      @keyframes packet3 {
        0%   { transform: translateX(0px);   opacity: 0; }
        5%   { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(660px); opacity: 0; }
      }
      @keyframes rpkt1 {
        0%   { transform: translateX(660px); opacity: 0; }
        5%   { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateX(0px);   opacity: 0; }
      }
      @keyframes rpkt2 {
        0%   { transform: translateX(660px); opacity: 0; }
        5%   { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateX(0px);   opacity: 0; }
      }
      @keyframes pulseL {
        0%, 100% { opacity: 0.7; }
        50%       { opacity: 1.0; }
      }
      @keyframes pulseR {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 0.9; }
      }
      @keyframes shimmer {
        0%   { opacity: 0.5; }
        50%  { opacity: 1.0; }
        100% { opacity: 0.5; }
      }
      @keyframes blink {
        0%, 49%, 100% { opacity: 1; }
        50%, 99%       { opacity: 0; }
      }
      .pk1 { animation: packet1 2.8s linear infinite; }
      .pk2 { animation: packet2 2.8s linear infinite 0.9s; }
      .pk3 { animation: packet3 2.8s linear infinite 1.8s; }
      .rk1 { animation: rpkt1 3.4s linear infinite 0.4s; }
      .rk2 { animation: rpkt2 3.4s linear infinite 1.6s; }
      .pillarL-glow { animation: pulseL 2.2s ease-in-out infinite; }
      .pillarR-glow { animation: pulseR 2.6s ease-in-out infinite 0.8s; }
      .rail-glow { animation: shimmer 3s ease-in-out infinite; }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- ── Background ── -->
  <rect width="860" height="220" fill="url(#bg)"/>
  <rect width="860" height="220" fill="url(#grid)"/>
  <rect width="860" height="220" fill="url(#scanlines)"/>

  <!-- ── Horizon line glow ── -->
  <rect x="0" y="130" width="860" height="2" fill="url(#rail)" opacity="0.4" class="rail-glow"/>

  <!-- ── Left pillar ── (client / agent side) -->
  <!-- Glow halo -->
  <ellipse cx="142" cy="182" rx="60" ry="40" fill="url(#pillarL)" class="pillarL-glow"/>
  <!-- Pillar body -->
  <rect x="120" y="90" width="44" height="92" rx="4" fill="#050c1a" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
  <!-- Pillar accent top -->
  <rect x="112" y="86" width="60" height="8" rx="2" fill="#00e5ff" opacity="0.15"/>
  <rect x="114" y="87" width="56" height="6" rx="2" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
  <!-- Pillar inner detail lines -->
  <line x1="130" y1="102" x2="154" y2="102" stroke="#00e5ff" stroke-width="0.4" opacity="0.4"/>
  <line x1="130" y1="112" x2="154" y2="112" stroke="#00e5ff" stroke-width="0.4" opacity="0.4"/>
  <line x1="130" y1="122" x2="154" y2="122" stroke="#00e5ff" stroke-width="0.4" opacity="0.25"/>
  <!-- Pillar status dot -->
  <circle cx="142" cy="135" r="4" fill="#00e5ff" opacity="0.9"/>
  <circle cx="142" cy="135" r="7" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.4"/>
  <!-- Pillar label -->
  <text x="142" y="170" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="#00e5ff" opacity="0.7" font-weight="500">AGENT</text>
  <text x="142" y="181" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8" fill="#00e5ff" opacity="0.45">claude-code</text>

  <!-- ── Right pillar ── (tools / backend side) -->
  <ellipse cx="718" cy="182" rx="60" ry="40" fill="url(#pillarR)" class="pillarR-glow"/>
  <rect x="696" y="90" width="44" height="92" rx="4" fill="#0a0520" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
  <rect x="688" y="86" width="60" height="8" rx="2" fill="#7c3aed" opacity="0.15"/>
  <rect x="690" y="87" width="56" height="6" rx="2" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.8"/>
  <line x1="706" y1="102" x2="730" y2="102" stroke="#7c3aed" stroke-width="0.4" opacity="0.4"/>
  <line x1="706" y1="112" x2="730" y2="112" stroke="#7c3aed" stroke-width="0.4" opacity="0.4"/>
  <line x1="706" y1="122" x2="730" y2="122" stroke="#7c3aed" stroke-width="0.4" opacity="0.25"/>
  <circle cx="718" cy="135" r="4" fill="#7c3aed" opacity="0.9"/>
  <circle cx="718" cy="135" r="7" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
  <text x="718" y="170" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="#a78bfa" opacity="0.7" font-weight="500">TOOLS</text>
  <text x="718" y="181" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8" fill="#a78bfa" opacity="0.45">mcp-registry</text>

  <!-- ── Bridge deck (main structure) ── -->
  <!-- Lower rail -->
  <line x1="100" y1="138" x2="760" y2="138" stroke="#1c2a40" stroke-width="3"/>
  <!-- Upper rail -->
  <line x1="100" y1="108" x2="760" y2="108" stroke="#1c2a40" stroke-width="2"/>
  <!-- Bridge deck fill -->
  <rect x="100" y="109" width="660" height="28" fill="rgba(0,229,255,0.025)"/>
  <!-- Glowing center rail -->
  <line x1="100" y1="123" x2="760" y2="123" stroke="url(#rail)" stroke-width="1.5" class="rail-glow"/>

  <!-- Vertical bridge struts -->
  <line x1="200" y1="108" x2="200" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>
  <line x1="300" y1="108" x2="300" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>
  <line x1="400" y1="108" x2="400" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>
  <line x1="500" y1="108" x2="500" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>
  <line x1="600" y1="108" x2="600" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>
  <line x1="700" y1="108" x2="700" y2="138" stroke="#1c2a40" stroke-width="1.2" opacity="0.7"/>

  <!-- ── Gateway node (center) ── -->
  <rect x="366" y="96" width="128" height="52" rx="8" fill="#050c1a" stroke="#00e5ff" stroke-width="1" opacity="0.95"/>
  <rect x="366" y="96" width="128" height="52" rx="8" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.3"/>
  <!-- Gateway icon - lightning bolt shape -->
  <polygon points="426,106 418,123 425,123 416,143 432,123 424,123 434,106" fill="none" stroke="#00e5ff" stroke-width="1.2" stroke-linejoin="round" opacity="0.85"/>
  <!-- Gateway inner glow dot -->
  <circle cx="430" cy="122" r="2" fill="#00e5ff" opacity="0.6"/>

  <!-- ── Animated data packets (left → right) ── -->
  <g clip-path="url(#bridgeclip)">
    <!-- Packet 1 - bright cyan -->
    <g class="pk1" style="transform-origin: 100px 120px">
      <rect x="100" y="116" width="16" height="8" rx="2" fill="#00e5ff" opacity="0.9"/>
      <rect x="100" y="116" width="28" height="8" rx="2" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>
      <ellipse cx="108" cy="120" rx="14" ry="6" fill="url(#pkglow)" opacity="0.4"/>
    </g>
    <!-- Packet 2 - slightly dimmer -->
    <g class="pk2" style="transform-origin: 100px 120px">
      <rect x="100" y="116" width="12" height="8" rx="2" fill="#00cfff" opacity="0.8"/>
      <ellipse cx="106" cy="120" rx="10" ry="5" fill="url(#pkglow)" opacity="0.35"/>
    </g>
    <!-- Packet 3 - small -->
    <g class="pk3" style="transform-origin: 100px 120px">
      <rect x="100" y="117" width="8" height="6" rx="2" fill="#4dd8e8" opacity="0.7"/>
    </g>
    <!-- Return packets (right → left, purple) -->
    <g class="rk1" style="transform-origin: 100px 120px">
      <rect x="100" y="118" width="10" height="5" rx="2" fill="#a78bfa" opacity="0.6"/>
    </g>
    <g class="rk2" style="transform-origin: 100px 120px">
      <rect x="100" y="119" width="7" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
    </g>
  </g>

  <!-- ── Main title text ── -->
  <text x="430" y="42" text-anchor="middle"
        font-family="'Syne', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5"
        fill="#e2eaf8">Bifrost</text>
  <text x="565" y="42" text-anchor="start"
        font-family="'Syne', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="400" letter-spacing="-0.5"
        fill="#00e5ff">·MCP</text>

  <!-- Slash separator -->
  <text x="660" y="42" text-anchor="start"
        font-family="'JetBrains Mono', monospace"
        font-size="28" font-weight="300"
        fill="#1c2a40">Gateway</text>

  <!-- ── Subtitle / tagline ── -->
  <text x="430" y="65" text-anchor="middle"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11" font-weight="400" letter-spacing="0.08em"
        fill="#5a7a9a">Dynamic schema routing · Lazy tool loading · Token-aware proxy</text>

  <!-- ── Decorative corner marks ── -->
  <!-- Top-left corner bracket -->
  <path d="M 16 16 L 16 36 M 16 16 L 36 16" stroke="#1c2a40" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Top-right corner bracket -->
  <path d="M 844 16 L 844 36 M 844 16 L 824 16" stroke="#1c2a40" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom-left corner bracket -->
  <path d="M 16 204 L 16 184 M 16 204 L 36 204" stroke="#1c2a40" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom-right corner bracket -->
  <path d="M 844 204 L 844 184 M 844 204 L 824 204" stroke="#1c2a40" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ── Token stat pills (bottom bar) ── -->
  <!-- Left stat -->
  <rect x="46" y="186" width="120" height="22" rx="11" fill="#0a1420" stroke="#1c2a40" stroke-width="0.8"/>
  <circle cx="64" cy="197" r="4" fill="#10b981" opacity="0.9"/>
  <text x="74" y="201" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5a7a9a">~85% tokens saved</text>

  <!-- Center stat -->
  <rect x="370" y="186" width="120" height="22" rx="11" fill="#0a1420" stroke="#1c2a40" stroke-width="0.8"/>
  <circle cx="388" cy="197" r="4" fill="#00e5ff" opacity="0.9"/>
  <text x="398" y="201" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5a7a9a">2 meta-tools only</text>

  <!-- Right stat -->
  <rect x="694" y="186" width="120" height="22" rx="11" fill="#0a1420" stroke="#1c2a40" stroke-width="0.8"/>
  <circle cx="712" cy="197" r="4" fill="#f59e0b" opacity="0.9"/>
  <text x="722" y="201" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5a7a9a">OWASP-hardened</text>

</svg>
